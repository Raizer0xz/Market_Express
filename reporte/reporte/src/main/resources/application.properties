spring.application.name=reporte
server.port=8090

# Base de datos (puede leer de varias DBs o tener la propia)
spring.datasource.url=jdbc:mysql://localhost:3306/db_reportes
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA (solo lectura, sin Flyway)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Logging
logging.level.root=INFO
logging.level.com.example.reporte=DEBUG
