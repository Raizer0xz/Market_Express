spring.application.name=producto
server.port=8083


# Base de datos INDEPENDIENTE ? solo para este MS
spring.datasource.url=jdbc:mysql://localhost:3306/db_productos
spring.datasource.username=root
spring.datasource.password=tu_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# JPA ? Hibernate crea/actualiza tablas automáticamente
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect


# Logging SLF4J (viene incluido con spring-boot-starter-web)
logging.level.root=INFO
logging.level.com.example.producto=DEBUG