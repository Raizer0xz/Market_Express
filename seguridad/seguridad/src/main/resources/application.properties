spring.application.name=seguridad
server.port=9099

# Base de datos
spring.datasource.url=jdbc:mysql://localhost:3306/db_seguridad
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# JWT
jwt.secret=marketexpress-secret-key-2024-seguridad-microservicio-jwt
jwt.expiration=86400000

# Logging
logging.level.root=INFO
logging.level.com.example.seguridad=DEBUG
